        <!-- background-change -->
        <script>
            const width = window.screen.width;
            const images = [
            "imgs/h032a720.png",
            "imgs/bg720.png"
            ];
            const images2 = [
            "imgs/h032a1920.png",
            "imgs/bg1080.png"
            ];

            const randomImage = images[Math.floor(Math.random() * images.length)];
            const randomImage2 = images2[Math.floor(Math.random() * images2.length)];

            if(width <= 1280){
                document.querySelector(".background").style.backgroundImage =
            `linear-gradient(rgba(0, 0, 0, 0.2)), url("${randomImage}")`;
            }
            else if(width <= 1920){
                document.querySelector(".background").style.backgroundImage =
            `linear-gradient(rgba(0, 0, 0, 0.2)), url("${randomImage2}")`;
            }
            else{
                document.querySelector(".background").style.backgroundImage =
            `linear-gradient(rgba(0, 0, 0, 0.2)), url("${randomImage2}")`;
